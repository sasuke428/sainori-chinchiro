<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>さいのり専用チンチロ</title>
  <style>
:root {
  --bg: #18130f;
  --panel: #251b15;
  --panel2: #312319;
  --gold: #f4c96a;
  --cream: #fff3d4;
  --muted: #bcae93;
  --red: #d74a35;
  --green: #4db06f;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  background: radial-gradient(circle at top, #3b2719 0%, var(--bg) 58%, #0f0b09 100%);
  color: var(--cream);
}
.app {
  width: min(980px, 100%);
  margin: 0 auto;
  padding: 28px 18px 44px;
}
.hero { text-align: center; }
.eyebrow { color: var(--gold); letter-spacing: .12em; font-weight: 700; margin: 0 0 8px; }
h1 { margin: 0; font-size: clamp(30px, 8vw, 54px); line-height: 1.05; }
.desc { color: var(--muted); margin: 14px auto 0; max-width: 720px; }

.setup {
  margin: 20px auto 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  max-width: 660px;
}
.setup label {
  display: grid;
  gap: 7px;
  padding: 14px;
  border-radius: 18px;
  background: rgba(37, 27, 21, .86);
  border: 1px solid rgba(255,255,255,.09);
}
.setup span { color: var(--muted); font-weight: 800; font-size: 13px; }
.setup input {
  width: 100%;
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 14px;
  background: #17100d;
  color: var(--cream);
  padding: 13px 14px;
  font-size: 19px;
  font-weight: 800;
  outline: none;
}
.setup input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(244,201,106,.14); }

.bowl-wrap { margin: 28px auto 20px; display: grid; place-items: center; }
.bowl {
  position: relative;
  width: min(720px, 96vw);
  height: 390px;
  border-radius: 50% 50% 46% 46%;
  background: radial-gradient(ellipse at 50% 35%, #5b3824 0%, #352016 52%, #1e130f 100%);
  border: 14px solid #8b5b35;
  box-shadow: inset 0 30px 70px rgba(0,0,0,.58), inset 0 -26px 54px rgba(255,190,105,.08), 0 36px 62px rgba(0,0,0,.42);
  overflow: hidden;
}
.rim {
  display: none;
  position: absolute;
  top: 18px;
  left: 42px;
  right: 42px;
  height: 96px;
  border-radius: 50%;
  border: 12px solid rgba(255, 220, 154, .22);
  box-shadow: inset 0 8px 16px rgba(0,0,0,.28);
}
.dice-stage { position: absolute; inset: 108px 86px 56px; }
.dice {
  position: absolute;
  width: 116px;
  height: 116px;
  border-radius: 24px;
  background: linear-gradient(145deg, #fffdf5 0%, #f0e7d4 46%, #cdbb98 100%);
  box-shadow: 0 13px 22px rgba(0,0,0,.44), inset -8px -8px 16px rgba(0,0,0,.16), inset 7px 7px 12px rgba(255,255,255,.88);
  transform: rotate(var(--r, 0deg));
  user-select: none;
}
.face {
  position: absolute;
  inset: 10px;
  border-radius: 18px;
  border: 1px solid rgba(0,0,0,.08);
  box-shadow: inset 0 0 10px rgba(255,255,255,.42);
}
.pip {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #38312a, #080605 76%);
  box-shadow: inset 1px 1px 2px rgba(255,255,255,.18), 0 1px 1px rgba(255,255,255,.24);
  transform: translate(-50%, -50%);
}
.p1 { left: 24%; top: 24%; }
.p2 { left: 50%; top: 24%; }
.p3 { left: 76%; top: 24%; }
.p4 { left: 24%; top: 50%; }
.p5 { left: 50%; top: 50%; }
.p6 { left: 76%; top: 50%; }
.p7 { left: 24%; top: 76%; }
.p8 { left: 50%; top: 76%; }
.p9 { left: 76%; top: 76%; }
.dice.a { left: 12%; top: 32%; --r: -12deg; }
.dice.b { left: 40%; top: 12%; --r: 9deg; }
.dice.c { left: 66%; top: 36%; --r: -6deg; }
.dice.rolling { animation: tumble .18s infinite linear, bounce .55s infinite ease-in-out; }
.dice.throwing { animation: throwIn .75s cubic-bezier(.2,.8,.2,1) both; }
.shadow {
  position: absolute;
  bottom: 42px;
  left: 24%;
  width: 52%;
  height: 46px;
  border-radius: 50%;
  background: rgba(0,0,0,.28);
  filter: blur(4px);
}
@keyframes tumble { from { transform: rotate(0deg) scale(1); } to { transform: rotate(360deg) scale(1.04); } }
@keyframes bounce { 0%, 100% { translate: 0 0; } 50% { translate: 0 -18px; } }
@keyframes throwIn {
  0% { translate: -210px -250px; rotate: -540deg; opacity: 0; scale: .62; }
  60% { opacity: 1; scale: 1.1; }
  100% { translate: 0 0; rotate: 0deg; opacity: 1; scale: 1; }
}

.controls { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 18px; }
button {
  border: 0;
  border-radius: 999px;
  padding: 15px 24px;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
}
.start-btn, .next-btn { background: linear-gradient(135deg, #ffd979, #f1993b); color: #251409; box-shadow: 0 12px 20px rgba(241,153,59,.22); }
.next-btn { background: linear-gradient(135deg, #b8efcc, #4db06f); }
.reset-btn { background: #3b2a20; color: var(--cream); border: 1px solid rgba(255,255,255,.12); }
button:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }

.players { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card, .result, .rules, .odds {
  background: rgba(37, 27, 21, .9);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 24px;
  padding: 18px;
  box-shadow: 0 10px 24px rgba(0,0,0,.18);
}
.card { text-align: center; position: relative; }
.card.active { outline: 3px solid rgba(244,201,106,.6); }
.card h2 { margin: 0 0 4px; font-size: 32px; color: var(--gold); overflow-wrap: anywhere; }
.turn { color: var(--muted); font-size: 13px; font-weight: 900; }
.roll { font-size: 24px; font-weight: 900; letter-spacing: .08em; margin-top: 8px; color: var(--muted); }
.rank { color: var(--gold); margin-top: 8px; font-size: 34px; line-height: 1.05; font-weight: 950; }
.card.win { outline: 3px solid var(--gold); }
.card.lose { opacity: .72; }
.result { margin-top: 14px; text-align: center; transition: transform .2s ease, box-shadow .2s ease; }
.result.final { border-color: rgba(244,201,106,.55); box-shadow: 0 0 0 3px rgba(244,201,106,.12), 0 16px 34px rgba(0,0,0,.28); transform: translateY(-1px); }
.result.final .winner { font-size: clamp(30px, 6vw, 46px); color: var(--gold); text-shadow: 0 2px 16px rgba(244,201,106,.2); }
.winner { font-size: 24px; font-weight: 900; }
.ratio { margin-top: 8px; font-size: 20px; color: var(--gold); font-weight: 900; }
.note { margin-top: 8px; color: var(--muted); }
.rules { margin-top: 14px; color: var(--muted); line-height: 1.7; }
.rules h3, .odds h3 { color: var(--cream); margin: 0 0 10px; }
.rules p { margin: 6px 0; }

.odds { margin-top: 14px; transition: opacity .2s ease, filter .2s ease; }
.odds.muted-after-result { opacity: .45; filter: saturate(.65); }
.hidden { display: none; }
.odds-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
.summary-item { border-radius: 18px; background: rgba(244,201,106,.12); border: 1px solid rgba(244,201,106,.22); padding: 13px 10px; text-align: center; }
.summary-label { color: var(--muted); font-size: 13px; font-weight: 900; }
.summary-value { margin-top: 4px; font-size: 24px; color: var(--gold); font-weight: 900; }
.odds-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.odds-item {
  border-radius: 18px;
  background: rgba(0,0,0,.18);
  border: 1px solid rgba(255,255,255,.08);
  padding: 13px 10px;
  text-align: center;
}
.odds-name { font-size: 20px; color: var(--gold); font-weight: 900; }
.odds-prob { margin-top: 5px; font-weight: 900; }
.odds-ratio { margin-top: 7px; color: var(--cream); font-size: 14px; line-height: 1.35; }
.odds-note { color: var(--muted); margin: 12px 0 0; line-height: 1.6; }

@media (max-width: 760px) { .odds-grid { grid-template-columns: repeat(2, 1fr); } .odds-summary { grid-template-columns: 1fr 1fr 1fr; } }
@media (max-width: 620px) {
  .setup { grid-template-columns: 1fr; }
  .bowl { height: 300px; }
  .dice-stage { inset: 88px 38px 48px; }
  .dice { width: 78px; height: 78px; border-radius: 16px; }
  .face { inset: 7px; border-radius: 12px; }
  .pip { width: 11px; height: 11px; }
  .players { grid-template-columns: 1fr; }
  .odds-summary { grid-template-columns: 1fr; }
}

  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">さい🎲のり</p>
      <h1>さいのり専用チンチロ</h1>
      <p class="desc">チンチロで比率を決める新感覚ノリ打ち</p>
    </section>

    <section class="setup" id="setupBox">
      <label>
        <span>先攻プレイヤー</span>
        <input id="nameA" type="text" value="" placeholder="名前を入力" maxlength="12" autocomplete="off" />
      </label>
      <label>
        <span>後攻プレイヤー</span>
        <input id="nameB" type="text" value="" placeholder="名前を入力" maxlength="12" autocomplete="off" />
      </label>
    </section>

    <section class="bowl-wrap" aria-label="どんぶりとサイコロ">
      <div class="bowl">
        <div class="rim"></div>
        <div class="dice-stage" id="diceStage">
          <div class="dice a" id="die1" data-face="4"></div>
          <div class="dice b" id="die2" data-face="5"></div>
          <div class="dice c" id="die3" data-face="6"></div>
        </div>
        <div class="shadow"></div>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="start-btn">先攻が振る</button>
      <button id="nextBtn" class="next-btn" disabled>プレイヤーチェンジして後攻が振る</button>
      <button id="resetBtn" class="reset-btn">リセット</button>
    </section>

    <section class="players">
      <article class="card active" id="cardA">
        <h2 id="labelA">先攻</h2>
        <div class="turn">先攻</div>
        <div class="roll" id="rollA">-</div>
        <div class="rank" id="rankA">待機中</div>
      </article>
      <article class="card" id="cardB">
        <h2 id="labelB">後攻</h2>
        <div class="turn">後攻</div>
        <div class="roll" id="rollB">-</div>
        <div class="rank" id="rankB">待機中</div>
      </article>
    </section>

    <section class="result" id="resultBox">
      <div class="winner" id="winnerText">名前を確認して、先攻から振ってください</div>
      <div class="ratio" id="ratioText">報酬比率：-</div>
      <div class="note" id="noteText">456サイは4・5・6だけが出るサイコロです。</div>
    </section>

    <section class="odds hidden" id="oddsBox">
      <h3 id="oddsTitle">後攻が振る前の出現率・報酬比率</h3>
      <div class="odds-summary" id="oddsSummary"></div>
      <div class="odds-grid" id="oddsGrid"></div>
      <p class="odds-note" id="oddsNote"></p>
    </section>

    <section class="rules">
      <h3>判定ルール</h3>
      <p>強さ：ゾロ目（4・5・6は同列） ＞ 456 ＞ 6 ＞ 5 ＞ 4</p>
      <p>報酬比率：ゾロ目vs456=2:1 / ゾロ目vs6・5・4=99:1 / 456vs6・5・4=3:1 / 6vs5・4、5vs4=2:1 / 同格=1:1</p>
    </section>
  </main>
  <script>
const DICE_VALUES = [4, 5, 6];
const OUTCOMES = [
  { type: 'triple', label: 'ゾロ目', count: 3 },
  { type: '456', label: '456', count: 6 },
  { type: '6', label: '6の目', count: 6 },
  { type: '5', label: '5の目', count: 6 },
  { type: '4', label: '4の目', count: 6 },
];
const TOTAL_PATTERNS = 27;

const startBtn = document.getElementById('startBtn');
const nextBtn = document.getElementById('nextBtn');
const resetBtn = document.getElementById('resetBtn');
const nameAInput = document.getElementById('nameA');
const nameBInput = document.getElementById('nameB');
const labelA = document.getElementById('labelA');
const labelB = document.getElementById('labelB');
const diceEls = [document.getElementById('die1'), document.getElementById('die2'), document.getElementById('die3')];
const rollA = document.getElementById('rollA');
const rollB = document.getElementById('rollB');
const rankA = document.getElementById('rankA');
const rankB = document.getElementById('rankB');
const resultBox = document.getElementById('resultBox');
const winnerText = document.getElementById('winnerText');
const ratioText = document.getElementById('ratioText');
const noteText = document.getElementById('noteText');
const cardA = document.getElementById('cardA');
const cardB = document.getElementById('cardB');
const oddsBox = document.getElementById('oddsBox');
const oddsGrid = document.getElementById('oddsGrid');
const oddsSummary = document.getElementById('oddsSummary');
const oddsTitle = document.getElementById('oddsTitle');
const oddsNote = document.getElementById('oddsNote');

let firstDice = null;
let firstEval = null;
let isRolling = false;

function playerAName() { return (nameAInput.value.trim() || '先攻'); }
function playerBName() { return (nameBInput.value.trim() || '後攻'); }

function syncNames() {
  labelA.textContent = playerAName();
  labelB.textContent = playerBName();
}

function randomDie() {
  return DICE_VALUES[Math.floor(Math.random() * DICE_VALUES.length)];
}

function rollDice() {
  return [randomDie(), randomDie(), randomDie()];
}

function evaluate(diceOrType) {
  if (typeof diceOrType === 'string') {
    const map = {
      triple: { power: 5, type: 'triple', label: 'ゾロ目' },
      '456': { power: 4, type: '456', label: '456' },
      '6': { power: 3, type: '6', label: '6の目' },
      '5': { power: 2, type: '5', label: '5の目' },
      '4': { power: 1, type: '4', label: '4の目' },
    };
    return map[diceOrType];
  }

  const dice = diceOrType;
  const sorted = [...dice].sort((a, b) => a - b);
  const counts = dice.reduce((acc, v) => ({ ...acc, [v]: (acc[v] || 0) + 1 }), {});
  const isTriple = Object.values(counts).some(v => v === 3);
  const is456 = sorted.join('') === '456';

  if (isTriple) return { power: 5, type: 'triple', label: `ゾロ目${dice[0]}` };
  if (is456) return { power: 4, type: '456', label: '456' };

  const pairNumber = Number(Object.keys(counts).find(k => counts[k] === 2));
  const singleNumber = Number(Object.keys(counts).find(k => counts[k] === 1));
  if (pairNumber && singleNumber) {
    return { power: singleNumber - 3, type: String(singleNumber), label: `${singleNumber}の目` };
  }
  return { power: 0, type: 'none', label: '無効' };
}

function getRatio(winnerEval, loserEval) {
  if (winnerEval.power === loserEval.power) return '1:1';
  if (winnerEval.type === 'triple' && loserEval.type === '456') return '2:1';
  if (winnerEval.type === 'triple') return '99:1';
  if (winnerEval.type === '456') return '3:1';
  return '2:1';
}

function ratioForPlayers(aEval, bEval) {
  if (aEval.power === bEval.power) return { text: `${playerAName()} 1 : 1 ${playerBName()}`, winner: 'draw' };
  const aWins = aEval.power > bEval.power;
  const ratio = getRatio(aWins ? aEval : bEval, aWins ? bEval : aEval);
  const [winShare, loseShare] = ratio.split(':');
  return {
    text: `${playerAName()} ${aWins ? winShare : loseShare} : ${aWins ? loseShare : winShare} ${playerBName()}`,
    winner: aWins ? 'A' : 'B',
  };
}

function renderPips(el, value) {
  const positions = {
    4: ['p1', 'p3', 'p7', 'p9'],
    5: ['p1', 'p3', 'p5', 'p7', 'p9'],
    6: ['p1', 'p3', 'p4', 'p6', 'p7', 'p9'],
  };
  el.dataset.face = value;
  el.innerHTML = `<div class="face">${positions[value].map(pos => `<span class="pip ${pos}"></span>`).join('')}</div>`;
}

function setDiceFaces(values) {
  diceEls.forEach((el, i) => renderPips(el, values[i]));
}

function animateRoll(finalDice, label) {
  return new Promise(resolve => {
    isRolling = true;
    noteText.textContent = `${label} がサイコロを投げています…`;
    diceEls.forEach((el, i) => {
      el.classList.remove('throwing');
      void el.offsetWidth;
      el.classList.add('throwing', 'rolling');
      el.style.animationDelay = `${i * 0.08}s`;
    });

    const interval = setInterval(() => setDiceFaces(rollDice()), 90);
    setTimeout(() => {
      clearInterval(interval);
      setDiceFaces(finalDice);
      diceEls.forEach(el => {
        el.classList.remove('rolling');
        el.style.animationDelay = '0s';
      });
      isRolling = false;
      resolve();
    }, 1250);
  });
}

function formatPercent(count) {
  return `${count}/${TOTAL_PATTERNS}（${(count / TOTAL_PATTERNS * 100).toFixed(1)}%）`;
}

function renderOdds() {
  const bName = playerBName();
  oddsTitle.textContent = `${bName} が振る前の出現率・報酬比率`;

  let winCount = 0;
  let drawCount = 0;
  let loseCount = 0;

  const rows = OUTCOMES.map(outcome => {
    const bEval = evaluate(outcome.type);
    const ratio = ratioForPlayers(firstEval, bEval);
    if (bEval.power > firstEval.power) winCount += outcome.count;
    else if (bEval.power === firstEval.power) drawCount += outcome.count;
    else loseCount += outcome.count;

    const prob = formatPercent(outcome.count);
    const resultLabel = ratio.winner === 'draw' ? '引き分け' : `${ratio.winner === 'A' ? playerAName() : playerBName()}勝ち`;
    return `
      <div class="odds-item">
        <div class="odds-name">${outcome.label}</div>
        <div class="odds-prob">${prob}</div>
        <div class="odds-ratio">${resultLabel}<br>${ratio.text}</div>
      </div>
    `;
  }).join('');

  oddsSummary.innerHTML = `
    <div class="summary-item">
      <div class="summary-label">${bName}の勝つ確率</div>
      <div class="summary-value">${formatPercent(winCount)}</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">引き分け率</div>
      <div class="summary-value">${formatPercent(drawCount)}</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">${bName}の負け確率</div>
      <div class="summary-value">${formatPercent(loseCount)}</div>
    </div>
  `;
  oddsGrid.innerHTML = rows;
  oddsNote.textContent = `先攻の目は「${firstEval.label}」。勝敗確率は後攻目線、下の比率は後攻がその目を出した場合の最終的な報酬比率です。`;
  oddsBox.classList.remove('hidden');
}

async function rollFirst() {
  if (isRolling) return;
  syncNames();
  firstDice = null;
  firstEval = null;
  startBtn.disabled = true;
  nextBtn.disabled = true;
  nameAInput.disabled = true;
  nameBInput.disabled = true;
  oddsBox.classList.add('hidden');
  oddsBox.classList.remove('muted-after-result');
  resultBox.classList.remove('final');
  cardA.classList.add('active');
  cardB.classList.remove('active', 'win', 'lose');
  cardA.classList.remove('win', 'lose');
  winnerText.textContent = '先攻の勝負中…';
  ratioText.textContent = '報酬比率：-';
  rollA.textContent = '-';
  rollB.textContent = '-';
  rankA.textContent = '待機中';
  rankB.textContent = '待機中';

  firstDice = rollDice();
  await animateRoll(firstDice, playerAName());
  firstEval = evaluate(firstDice);
  rollA.textContent = firstDice.join('・');
  rankA.textContent = firstEval.label;
  winnerText.textContent = `${playerAName()} の目が確定`;
  ratioText.textContent = `先攻：${firstEval.label}`;
  noteText.textContent = `プレイヤーチェンジ後、${playerBName()} が振ります。`;
  cardA.classList.remove('active');
  cardB.classList.add('active');
  renderOdds();
  nextBtn.disabled = false;
}

async function rollSecond() {
  if (isRolling || !firstDice) return;
  nextBtn.disabled = true;
  const secondDice = rollDice();
  await animateRoll(secondDice, playerBName());
  renderResult(firstDice, secondDice);
  startBtn.textContent = 'もう一度、先攻から振る';
  startBtn.disabled = false;
}

function renderResult(aDice, bDice) {
  const aEval = evaluate(aDice);
  const bEval = evaluate(bDice);
  rollA.textContent = aDice.join('・');
  rollB.textContent = bDice.join('・');
  rankA.textContent = aEval.label;
  rankB.textContent = bEval.label;
  resultBox.classList.add('final');
  oddsBox.classList.add('muted-after-result');

  cardA.classList.remove('active', 'win', 'lose');
  cardB.classList.remove('active', 'win', 'lose');

  const ratio = ratioForPlayers(aEval, bEval);
  if (ratio.winner === 'draw') {
    winnerText.textContent = '引き分け';
    ratioText.textContent = `報酬比率：${ratio.text}`;
    noteText.textContent = '同じ強さの目なので1:1です。';
    return;
  }

  const aWins = ratio.winner === 'A';
  winnerText.textContent = `${aWins ? playerAName() : playerBName()} の勝ち`;
  ratioText.textContent = `報酬比率：${ratio.text}`;
  noteText.textContent = `${aWins ? aEval.label : bEval.label} が ${aWins ? bEval.label : aEval.label} に勝利。`;
  (aWins ? cardA : cardB).classList.add('win');
  (aWins ? cardB : cardA).classList.add('lose');
}

function reset() {
  firstDice = null;
  firstEval = null;
  isRolling = false;
  syncNames();
  setDiceFaces([4, 5, 6]);
  rollA.textContent = '-';
  rollB.textContent = '-';
  rankA.textContent = '待機中';
  rankB.textContent = '待機中';
  winnerText.textContent = '名前を確認して、先攻から振ってください';
  ratioText.textContent = '報酬比率：-';
  noteText.textContent = '456サイは4・5・6だけが出るサイコロです。';
  cardA.classList.add('active');
  cardB.classList.remove('active', 'win', 'lose');
  cardA.classList.remove('win', 'lose');
  oddsBox.classList.add('hidden');
  oddsBox.classList.remove('muted-after-result');
  resultBox.classList.remove('final');
  startBtn.textContent = '先攻が振る';
  startBtn.disabled = false;
  nextBtn.disabled = true;
  nameAInput.disabled = false;
  nameBInput.disabled = false;
}

nameAInput.addEventListener('input', syncNames);
nameBInput.addEventListener('input', syncNames);
startBtn.addEventListener('click', rollFirst);
nextBtn.addEventListener('click', rollSecond);
resetBtn.addEventListener('click', reset);
setDiceFaces([4, 5, 6]);
syncNames();

  </script>
</body>
</html>
